kind = "web"
previewPath = "/"
title = "Territory Battle Live"
version = "1.0.0"
id = "artifacts/territory-battle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20053

[services.development]
run = "pnpm --filter @workspace/territory-battle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/territory-battle", "run", "build" ]
publicDir = "artifacts/territory-battle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20053"
BASE_PATH = "/"
